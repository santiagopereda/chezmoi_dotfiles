---
- name: Provision workstation
  hosts: localhost
  connection: local

  pre_tasks:
    - name: Validate supported platform
      ansible.builtin.assert:
        that:
          - ansible_facts['os_family'] in ["Debian", "Darwin"]
        fail_msg: "Unsupported OS family: {{ ansible_facts['os_family'] }}. Only Debian/Ubuntu and macOS are supported."
      tags:
        - always

    - name: Set dpkg architecture
      ansible.builtin.set_fact:
        dpkg_arch: "{{ ansible_facts['architecture'] | regex_replace('x86_64', 'amd64') | regex_replace('aarch64', 'arm64') }}"
      when: ansible_facts['os_family'] == "Debian"
      tags:
        - always

    - name: Find apt sources referencing legacy Microsoft GPG key path
      ansible.builtin.shell:
        cmd: grep -rl '/usr/share/keyrings/microsoft.gpg' /etc/apt/sources.list.d/ 2>/dev/null || true
      become: true
      register: legacy_microsoft_sources
      changed_when: false
      when: ansible_facts['os_family'] == "Debian"
      tags:
        - always

    - name: Remove apt sources referencing legacy Microsoft GPG key path
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      become: true
      loop: "{{ legacy_microsoft_sources.stdout_lines | default([]) }}"
      when: ansible_facts['os_family'] == "Debian"
      tags:
        - always

    - name: Remove legacy Microsoft GPG key
      ansible.builtin.file:
        path: /usr/share/keyrings/microsoft.gpg
        state: absent
      become: true
      when: ansible_facts['os_family'] == "Debian"
      tags:
        - always

  roles:
    - role: common
      tags:
        - common
    - role: security
      tags:
        - security
    - role: docker
      tags:
        - docker
    - role: shell
      tags:
        - shell
    - role: python
      tags:
        - python
    - role: node
      tags:
        - node
    - role: apps
      when: desktop_mode | bool
      tags:
        - apps
    - role: fonts
      tags:
        - fonts
