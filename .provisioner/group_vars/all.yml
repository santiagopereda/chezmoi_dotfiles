---
# User configuration
desktop_user: "{{ ansible_facts['user_id'] }}"
desktop_home: "{{ lookup('env', 'HOME') }}"

# Set to false on headless machines (skips desktop apps, snap packages)
desktop_mode: true

# Terminal emulators (override in host_vars/localhost.yml per machine)
install_kitty: false
install_ghostty: false

# Python versions to install via uv
python_versions:
  - "3.13"

# Node.js versions to install via fnm
node_versions:
  - "22"

# Nerd Font
nerd_font_name: Hack
nerd_font_version: "3.3.0"
nerd_font_cask: font-hack-nerd-font

# Common packages - Debian/Ubuntu
common_packages_debian:
  - git
  - make
  - build-essential
  - curl
  - wget
  - unzip
  - jq
  - tree
  - neovim
  - tmux
  - tmuxinator
  - zsh
  - direnv
  - imagemagick
  - ranger
  - btop
  - gh
  - fzf
  - ripgrep
  - fd-find
  - bat
  - eza
  - nmap
  - openjdk-17-jdk

# Common packages - macOS (Homebrew)
common_packages_darwin:
  - git
  - curl
  - wget
  - unzip
  - jq
  - tree
  - neovim
  - tmux
  - tmuxinator
  - zsh
  - direnv
  - imagemagick
  - ranger
  - btop
  - gh
  - fzf
  - ripgrep
  - fd
  - bat
  - eza
  - tldr
  - yq
  - git-delta
  - lazydocker
  - lazygit
  - nmap
  - openjdk@17
  - go
  - rustup

# Docker
docker_packages_debian:
  - docker-ce
  - docker-ce-cli
  - containerd.io
docker_add_user_to_group: true

# Security / SSH hardening / fail2ban
security_ssh_max_auth_tries: 6
security_fail2ban_maxretry: 5
security_fail2ban_ignoreip:
  - 127.0.0.1/8
  - "::1"

# Desktop apps - apt packages (Debian/Ubuntu)
apps_apt_packages_debian:
  - vlc
  - obs-studio
  - remmina
  - flameshot

# Desktop apps - snap packages (Debian/Ubuntu, all architectures)
apps_snap_packages_debian:
  - { name: postman }
  - { name: localsend }

# Desktop apps - snap packages (amd64 only)
apps_snap_packages_debian_amd64:
  - { name: bitwarden }
  - { name: dbeaver-ce }
  - { name: drawio }

# Desktop apps - Homebrew casks (macOS)
apps_cask_packages_darwin:
  - brave-browser
  - 1password
  - bitwarden
  - visual-studio-code
  - librewolf
  - spotify
  - vlc
  - obs
  - obsidian
  - dbeaver-community
  - postman
  - drawio
  - localsend
  - flameshot

# Obsidian version (GitHub .deb for Debian)
obsidian_version: "1.7.7"

# Extra packages (override in host_vars for per-machine customization)
extra_packages_debian: []
extra_packages_darwin: []
