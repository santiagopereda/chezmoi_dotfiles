---
# User configuration
desktop_user: "{{ ansible_user_id }}"
desktop_home: "{{ lookup('env', 'HOME') }}"

# Python versions to install via uv
python_versions:
  - "3.13"

# Nerd Font
nerd_font_name: Hack
nerd_font_version: "3.3.0"
nerd_font_cask: font-hack-nerd-font

# Common packages - Debian/Ubuntu
common_packages_debian:
  - git
  - make
  - build-essential
  - curl
  - wget
  - unzip
  - jq
  - tree
  - neovim
  - tmux
  - tmuxinator
  - zsh
  - direnv
  - imagemagick
  - ranger

# Common packages - macOS (Homebrew)
common_packages_darwin:
  - git
  - curl
  - wget
  - unzip
  - jq
  - tree
  - neovim
  - tmux
  - tmuxinator
  - zsh
  - direnv
  - imagemagick
  - ranger

# Docker
docker_packages_debian:
  - docker-ce
  - docker-ce-cli
  - containerd.io
docker_add_user_to_group: true

# Security / SSH hardening / fail2ban
security_ssh_max_auth_tries: 6
security_fail2ban_maxretry: 5
security_fail2ban_ignoreip:
  - 127.0.0.1/8
  - "::1"

# Extra packages (override in host_vars for per-machine customization)
extra_packages_debian: []
extra_packages_darwin: []
