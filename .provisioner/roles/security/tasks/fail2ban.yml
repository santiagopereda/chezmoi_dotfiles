---
- name: Install fail2ban
  ansible.builtin.apt:
    name: fail2ban
    state: present
  tags:
    - security
    - fail2ban

- name: Deploy fail2ban SSH jail configuration
  ansible.builtin.template:
    src: jail.local.j2
    dest: /etc/fail2ban/jail.local
    owner: root
    group: root
    mode: "0644"
  notify: restart fail2ban
  tags:
    - security
    - fail2ban

- name: Enable and start fail2ban
  ansible.builtin.systemd:
    name: fail2ban
    enabled: true
    state: started
  tags:
    - security
    - fail2ban
