---
- name: restart sshd
  ansible.builtin.systemd:
    name: sshd
    state: restarted
    enabled: true

- name: restart sshd macos
  ansible.builtin.command:
    cmd: launchctl kickstart -k system/com.openssh.sshd

- name: restart fail2ban
  ansible.builtin.systemd:
    name: fail2ban
    state: restarted
    enabled: true

- name: reload ufw
  community.general.ufw:
    state: reloaded
