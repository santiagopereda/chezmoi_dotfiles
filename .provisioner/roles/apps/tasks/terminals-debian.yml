---
# Kitty (available in apt)
- name: Install Kitty
  ansible.builtin.apt:
    name: kitty
    state: present
  become: true
  when: install_kitty | bool
  tags:
    - apps
    - terminals

# Ghostty (via snap — works on all architectures and Ubuntu versions)
- name: Install Ghostty
  community.general.snap:
    name: ghostty
    classic: true
    state: present
  become: true
  when: install_ghostty | bool
  tags:
    - apps
    - terminals
