---
# Brave Browser (amd64 only)
- name: Add Brave GPG key
  ansible.builtin.get_url:
    url: https://brave-browser-apt-release.s3.brave.com/brave-browser-archive-keyring.gpg
    dest: "{{ apps_brave_apt_key_path }}"
    mode: "0644"
  become: true
  when: ansible_facts['architecture'] == 'x86_64'
  tags:
    - apps

- name: Add Brave apt repository
  ansible.builtin.apt_repository:
    repo: >-
      deb [arch=amd64
      signed-by={{ apps_brave_apt_key_path }}]
      https://brave-browser-apt-release.s3.brave.com/
      stable main
    state: present
    filename: brave-browser
  become: true
  when: ansible_facts['architecture'] == 'x86_64'
  tags:
    - apps

# 1Password (amd64 only, key is ASCII-armored)
- name: Add 1Password GPG key
  ansible.builtin.shell:
    cmd: curl -fsSL https://downloads.1password.com/linux/keys/1password.asc | gpg --dearmor --yes -o {{ apps_1password_apt_key_path }}
    creates: "{{ apps_1password_apt_key_path }}"
  become: true
  when: ansible_facts['architecture'] == 'x86_64'
  tags:
    - apps

- name: Add 1Password apt repository
  ansible.builtin.apt_repository:
    repo: >-
      deb [arch=amd64
      signed-by={{ apps_1password_apt_key_path }}]
      https://downloads.1password.com/linux/debian/amd64
      stable main
    state: present
    filename: 1password
  become: true
  when: ansible_facts['architecture'] == 'x86_64'
  tags:
    - apps

# Spotify (amd64 only)
- name: Add Spotify GPG key
  ansible.builtin.get_url:
    url: https://download.spotify.com/debian/pubkey_5384CE82BA52C83A.gpg
    dest: "{{ apps_spotify_apt_key_path }}"
    mode: "0644"
    force: true
  become: true
  when: ansible_facts['architecture'] == 'x86_64'
  tags:
    - apps

- name: Add Spotify apt repository
  ansible.builtin.apt_repository:
    repo: >-
      deb [signed-by={{ apps_spotify_apt_key_path }}]
      http://repository.spotify.com
      stable non-free
    state: present
    filename: spotify
  become: true
  when: ansible_facts['architecture'] == 'x86_64'
  tags:
    - apps

# VS Code (all architectures, key is ASCII-armored)
- name: Add Microsoft GPG key
  ansible.builtin.shell:
    cmd: curl -fsSL https://packages.microsoft.com/keys/microsoft.asc | gpg --dearmor --yes -o {{ apps_vscode_apt_key_path }}
    creates: "{{ apps_vscode_apt_key_path }}"
  become: true
  tags:
    - apps

- name: Add VS Code apt repository
  ansible.builtin.apt_repository:
    repo: >-
      deb [arch={{ dpkg_arch }}
      signed-by={{ apps_vscode_apt_key_path }}]
      https://packages.microsoft.com/repos/code
      stable main
    state: present
    filename: vscode
  become: true
  tags:
    - apps

# Tailscale (all architectures)
- name: Add Tailscale GPG key
  ansible.builtin.get_url:
    url: https://pkgs.tailscale.com/stable/{{ ansible_facts['distribution'] | lower }}/{{ ansible_facts['distribution_release'] }}.noarmor.gpg
    dest: "{{ apps_tailscale_apt_key_path }}"
    mode: "0644"
  become: true
  tags:
    - apps

- name: Add Tailscale apt repository
  ansible.builtin.apt_repository:
    repo: >-
      deb [signed-by={{ apps_tailscale_apt_key_path }}]
      https://pkgs.tailscale.com/stable/{{ ansible_facts['distribution'] | lower }}
      {{ ansible_facts['distribution_release'] }} main
    state: present
    filename: tailscale
  become: true
  tags:
    - apps

# LibreWolf (uses extrepo, all architectures)
- name: Install extrepo for LibreWolf
  ansible.builtin.apt:
    name: extrepo
    state: present
  become: true
  tags:
    - apps

- name: Enable LibreWolf repository via extrepo
  ansible.builtin.command:
    cmd: extrepo enable librewolf
  become: true
  register: librewolf_extrepo
  changed_when: "'already enabled' not in librewolf_extrepo.stderr | default('')"
  tags:
    - apps
