---
- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600
  become: true
  tags:
    - common
    - packages

- name: Install common packages
  ansible.builtin.apt:
    name: "{{ common_packages_debian + extra_packages_debian }}"
    state: present
  become: true
  tags:
    - common
    - packages
