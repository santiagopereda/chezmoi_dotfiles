---
- name: Check Homebrew (Apple Silicon)
  ansible.builtin.stat:
    path: /opt/homebrew/bin/brew
  register: homebrew_arm
  tags:
    - common
    - packages

- name: Check Homebrew (Intel)
  ansible.builtin.stat:
    path: /usr/local/bin/brew
  register: homebrew_intel
  tags:
    - common
    - packages

- name: Install Homebrew
  ansible.builtin.shell:
    cmd: /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
  environment:
    NONINTERACTIVE: "1"
  when: not homebrew_arm.stat.exists and not homebrew_intel.stat.exists
  tags:
    - common
    - packages

- name: Install common packages via Homebrew
  community.general.homebrew:
    name: "{{ common_packages_darwin + extra_packages_darwin }}"
    state: present
  tags:
    - common
    - packages
