# -- general -------------------------------------------------------------------

# Send prefix
set -g prefix C-Space
unbind C-b

# Boost history
set -g history-limit 50000

# Mouse mode
set -g mouse on

# Reduce escape delay (default 500ms adds lag in neovim)
set -sg escape-time 10

# Enable focus events (needed for vim autoread, direnv)
set -g focus-events on

# Terminal and true color
set -g default-terminal "tmux-256color"
set -as terminal-overrides ",*:RGB"
set-option -g status-style bg=default

# Status bar position
set-option -g status-position top

# Easy config reload
bind r source ~/.config/tmux/tmux.conf \; display "Reloaded!"

# -- navigation ----------------------------------------------------------------

# Create session
bind C-c new-session

# Find session
bind C-f command-prompt -p find-session 'switch-client -t %%'

# Kill pane/window/session shortcuts
bind x kill-pane
bind X kill-window
bind C-x confirm-before -p "kill other windows? (y/n)" "kill-window -a"
bind Q confirm-before -p "kill-session #S? (y/n)" kill-session

# Shift arrow to switch windows
bind -n S-Left previous-window
bind -n S-Right next-window

# Split panes (keep current path)
bind-key "|" split-window -h -c "#{pane_current_path}"
bind-key "-" split-window -v -c "#{pane_current_path}"

# Pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind > swap-pane -D
bind < swap-pane -U

# Pane resizing
bind -r H resize-pane -L 2
bind -r J resize-pane -D 2
bind -r K resize-pane -U 2
bind -r L resize-pane -R 2

# -- copy mode -----------------------------------------------------------------

# Vi bindings in copy mode
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# -- display -------------------------------------------------------------------

# Start numbering at 1
set -g base-index 1
setw -g pane-base-index 1

# Auto-rename and renumber
setw -g automatic-rename on
set -g renumber-windows on

# Terminal title
set -g set-titles on

# Display timings
set -g display-panes-time 800
set -g display-time 1000
set -g status-interval 5

# Clear screen and history
bind -n C-l send-keys C-l \; run 'sleep 0.2' \; clear-history

# Activity
set -g monitor-activity on
set -g visual-activity off

# -- urlview -------------------------------------------------------------------

bind U run "cut -c3- ~/.config/tmux/tmux.conf | sh -s _urlview #{pane_id}"

# -- status bar ----------------------------------------------------------------

set-option -g status-left-length 60
set-option -g status-right-length 130
set-option -g status-justify centre
set -g window-status-separator ""
separator_powerline_left=""
separator_powerline_right=""

# Status left
set-option -g status-left "\
#[fg=colour7]$separator_powerline_left\
#[fg=colour7] #(whoami) \
#[fg=colour7]#{?client_prefix, #S , #S }\
#[fg=colour7]#(~/.config/tmux/is_online.sh )\
#[fg=colour7]#(~/.config/tmux/cpu_temp.sh )\
#[fg=colour7]$separator_powerline_right"

# Status right
set-option -g status-right "\
#[fg=colour7]#(~/.config/tmux/docker_count.sh ) \
#[fg=colour7]#(~/.config/tmux/remote_online.sh ) \
#[fg=colour7]#(~/.config/tmux/battery_meter.sh ) \
#[fg=colour7]  %R  "

# Inactive window
set-window-option -g window-status-format "\
#[fg=colour008] #I\
#[fg=colour008]  #W"

# Current window
set-window-option -g window-status-current-format "\
#[fg=colour002] #I\
#[fg=colour002]  #W"
